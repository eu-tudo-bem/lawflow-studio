      *,::before,::after{box-sizing:border-box}

      /* Static hero shell — reserves exact space before React hydrates, eliminating CLS */

        position:relative;min-height:100vh;display:flex;align-items:center;

      }
      #hero-shell-bg{

      }
      #hero-shell-overlay{
        position:absolute;inset:0;
        background:linear-gradient(to right,rgba(13,17,32,0.95) 0%,rgba(13,17,32,0.85) 50%,rgba(13,17,32,0.70) 100%);

      /* Hide shell once React mounts (#root has children) — avoids double-render flash */
      #root:not(:empty) ~ #hero-shell-static{display:none}
